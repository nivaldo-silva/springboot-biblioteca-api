# Configurações para o ambiente de desenvolvimento
server:
  port: 8091
spring:
  application:
    name: biblioteca-api
  profiles:
    active: production
  config:
    import: optional:file:.env[.properties]
  output:
    ansi:
      enabled: ALWAYS
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/biblioteca}
    username: ${DATABASE_USERNAME:root}
    password: ${DATABASE_PASSWORD:root}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

logging:
  pattern:
    console: '%clr(%d{dd-MM-yyyy HH:mm:ss}){faint} %clr(%5p) %clr([%t]){faint} %clr(%-40.40logger){cyan} %clr(:){yellow} %m%n'
  file:
    name: logs/app.log
  level:
    root: INFO
    io.github.nivaldosilva: DEBUG
    org.springframework.web: DEBUG

---
# Configurações para o ambiente de produção
server:
  port: 8091
spring:
  config:
    activate:
      on-profile: production
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false

logging:
  level:
    root: WARN
    io.github.nivaldosilva: INFO
    org.springframework.web: WARN